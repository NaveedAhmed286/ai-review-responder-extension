<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <img src="icons/icon48.png" alt="Logo" class="logo">
            <h1>AI Review Responder</h1>
        </div>
        
        <!-- License Section (if not logged in) -->
        <div id="licenseSection" class="section">
            <p>Enter your license key to get started:</p>
            <input type="text" id="licenseKey" placeholder="xxxx-xxxx-xxxx-xxxx" class="input-field">
            <button id="saveLicenseBtn" class="btn primary">Save License</button>
            <p class="small">Don't have a license? <a href="https://responder.aiinfra.work/purchase" target="_blank">Purchase here</a></p>
        </div>
        
        <!-- Main Section (when logged in) -->
        <div id="mainSection" class="section" style="display: none;">
            <div class="status-card">
                <span id="currentPlatform" class="platform-badge">Loading...</span>
                <span id="licenseStatus" class="license-badge">Active</span>
            </div>
            
            <div class="review-card" id="reviewCard">
                <h3>Detected Review:</h3>
                <div id="reviewText" class="review-text">Loading review...</div>
                <button id="refreshReviewBtn" class="btn secondary small">
                    ↻ Refresh
                </button>
            </div>
            
            <div class="options-card">
                <label for="toneSelect">Response Tone:</label>
                <select id="toneSelect" class="select-field">
                    <option value="professional">Professional</option>
                    <option value="friendly">Friendly</option>
                    <option value="enthusiastic">Enthusiastic</option>
                    <option value="formal">Formal</option>
                </select>
            </div>
            
            <button id="generateBtn" class="btn primary large">
                ✨ Generate Response
            </button>
            
            <div id="responseSection" style="display: none;">
                <h3>AI Response:</h3>
                <textarea id="responseText" class="response-textarea" rows="4" readonly></textarea>
                
                <div class="button-group">
                    <button id="copyBtn" class="btn secondary">
                        📋 Copy
                    </button>
                    <button id="fillBtn" class="btn primary">
                        📝 Fill Reply Box
                    </button>
                    <button id="regenerateBtn" class="btn secondary">
                        🔄 Regenerate
                    </button>
                </div>
            </div>
            
            <div class="usage-card">
                <p>Usage this month: <span id="usageCount">-</span>/<span id="usageLimit">-</span></p>
                <div class="progress-bar">
                    <div id="usageProgress" class="progress-fill" style="width: 0%"></div>
                </div>
            </div>
            
            <button id="logoutBtn" class="btn text small">Sign Out</button>
        </div>
        
        <!-- Status Messages -->
        <div id="statusMessage" class="status-message"></div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
