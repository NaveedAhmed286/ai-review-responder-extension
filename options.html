<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Review Responder - Settings</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #1a1a1a;
            margin-bottom: 30px;
        }
        
        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .section h2 {
            font-size: 18px;
            color: #ff6b35;
            margin-bottom: 15px;
        }
        
        .setting {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .btn {
            background: #ff6b35;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #e54b1f;
        }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        
        .status.success {
            background: #4caf50;
            color: white;
            display: block;
        }
        
        .status.error {
            background: #f44336;
            color: white;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ AI Review Responder Settings</h1>
        
        <div class="section">
            <h2>License</h2>
            <div class="setting">
                <label>License Key:</label>
                <input type="text" id="licenseKey" placeholder="Enter your license key">
            </div>
            <button id="saveLicense" class="btn">Save License</button>
        </div>
        
        <div class="section">
            <h2>Default Settings</h2>
            <div class="setting">
                <label>Default Response Tone:</label>
                <select id="defaultTone">
                    <option value="professional">Professional</option>
                    <option value="friendly">Friendly</option>
                    <option value="enthusiastic">Enthusiastic</option>
                    <option value="formal">Formal</option>
                </select>
            </div>
            
            <div class="setting">
                <label>Auto-fill reply box after generation:</label>
                <select id="autoFill">
                    <option value="yes">Yes</option>
                    <option value="no">No (manual fill)</option>
                </select>
            </div>
        </div>
        
        <div class="section">
            <h2>About</h2>
            <p>Version: 1.0.0</p>
            <p>Website: <a href="https://responder.aiinfra.work" target="_blank">responder.aiinfra.work</a></p>
            <p>Support: <a href="mailto:hi@aiinfra.work">hi@aiinfra.work</a></p>
        </div>
        
        <div id="status" class="status"></div>
    </div>
    
    <script src="options.js"></script>
</body>
</html>
